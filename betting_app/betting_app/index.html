<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANGEL HOME</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f0f23; color: white; margin: 0; padding: 0; }
        header { background: linear-gradient(135deg, #4a00e0, #8e2de2); padding: 20px; text-align: center; }
        .logo { font-size: 28px; font-weight: bold; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .match { background: #1a1a2e; margin: 15px 0; padding: 15px; border-radius: 12px; }
        button { background: #8e2de2; color: white; border: none; padding: 12px 20px; margin: 5px; border-radius: 8px; cursor: pointer; }
        input { padding: 12px; margin: 8px 0; width: 100%; border-radius: 8px; border: none; }
        .balance { font-size: 22px; font-weight: bold; color: #00ff88; }
    </style>
</head>
<body>
    <header>
        <div class="logo">👼 ANGEL HOME</div>
        <p>Paris Sportifs • Simulation</p>
    </header>

    <div class="container">
        <h2>Créer un compte</h2>
        <input type="text" id="username" placeholder="Nom d'utilisateur">
        <input type="email" id="email" placeholder="Email">
        <input type="password" id="password" placeholder="Mot de passe">
        <button onclick="register()">Créer le compte</button>

        <hr>

        <h2>Connexion</h2>
        <input type="text" id="login_username" placeholder="Nom d'utilisateur">
        <input type="password" id="login_password" placeholder="Mot de passe">
        <button onclick="login()">Se connecter</button>

        <div id="user-info" style="display:none;">
            <h3>Bienvenue, <span id="current-user"></span></h3>
            <p class="balance">Solde : <span id="balance">0</span> €</p>
            <button onclick="deposit()">Déposer 50€ fictifs</button>
        </div>

        <h2>Matchs en cours</h2>
        <div id="matches"></div>

        <h2>Mes paris</h2>
        <div id="my-bets"></div>
    </div>

    <script>
        let currentUser = null;
        const API_URL = "https://angel-home.up.railway.app"; // On changera après déploiement

        async function register() {
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const res = await fetch('http://127.0.0.1:8000/register?username=' + username + '&email=' + email + '&password=' + password, { method: 'POST' });
            const data = await res.json();
            alert(data.message || JSON.stringify(data));
        }

        async function login() {
            const username = document.getElementById('login_username').value;
            currentUser = username;
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('current-user').textContent = username;
            loadUserData();
            loadMatches();
        }

        async function loadUserData() {
            if (!currentUser) return;
            const res = await fetch('http://127.0.0.1:8000/user/' + currentUser);
            const user = await res.json();
            document.getElementById('balance').textContent = user.balance;
        }

        async function deposit() {
            if (!currentUser) return alert("Connecte-toi d'abord");
            alert("50€ fictifs ajoutés (simulation)");
            // Dans la vraie version on ajoutera une route deposit
            loadUserData();
        }

        async function loadMatches() {
            const res = await fetch('http://127.0.0.1:8000/matches');
            const matches = await res.json();
            let html = '';
            matches.forEach(m => {
                html += `
                    <div class="match">
                        <strong>${m.home} vs ${m.away}</strong><br>
                        <small>${m.time}</small><br><br>
                        <button onclick="placeBet(${m.id}, 'home')">1 : ${m.cote_home}</button>
                        <button onclick="placeBet(${m.id}, 'draw')">N : ${m.cote_draw}</button>
                        <button onclick="placeBet(${m.id}, 'away')">2 : ${m.cote_away}</button>
                    </div>`;
            });
            document.getElementById('matches').innerHTML = html;
        }

        async function placeBet(matchId, choice) {
            if (!currentUser) return alert("Connecte-toi d'abord");
            const amount = prompt("Montant du pari (€) :", "10");
            if (!amount) return;

            const res = await fetch('http://127.0.0.1:8000/bet?username=' + currentUser + '&match_id=' + matchId + '&choice=' + choice + '&amount=' + amount, {
                method: 'POST'
            });
            const data = await res.json();
            alert(data.message);
            loadUserData();
        }

        // Charger les matchs au démarrage
        loadMatches();
    </script>
</body>
</html>
